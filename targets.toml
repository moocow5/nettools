label = "Google"
mode = "tcp-connect"
port = 443
interval = "2s"

[[target]]
host = "cloudflare.com"
label = "Cloudflare"
mode = "tcp-connect"
port = 443
interval = "2s"

[[target]]
host = "9.9.9.9"
label = "Quad9 DNS"
mode = "icmp"
